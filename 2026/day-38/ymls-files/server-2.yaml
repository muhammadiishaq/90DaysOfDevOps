server:
  name: web-server
  ip: 192.168.0.1
  ports:
    - 80
  startup_script: |
    sudo yum update -y
    sudo yum install nginx -y
    sudo systemctl enable nginx
  description: >
    This server is used for hosting the web application.
    It installs nginx and enables the service
    during system startup.

database:
  host: db-server
  name: dev_db
  credentials:
    user: admin
    password: admin123
