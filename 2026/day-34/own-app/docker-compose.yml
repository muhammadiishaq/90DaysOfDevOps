version: "3.9"

services:
  web:
    build: ./app
    container_name: flask_app
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=appdb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    labels:
      project: "day-34"
      tier: "frontend"

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    labels:
      project: "day-34"
      tier: "database"

  redis:
    image: redis:7
    container_name: redis_cache
    networks:
      - app-network
    labels:
      project: "day-34"
      tier: "cache"

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
